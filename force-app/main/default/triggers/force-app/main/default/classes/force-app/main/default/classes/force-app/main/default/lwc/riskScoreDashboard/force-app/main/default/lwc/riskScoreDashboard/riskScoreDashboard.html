<template>
    <lightning-card title="Customer Risk Dashboard" icon-name="standard:account">

        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading risk data..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>

            <div class="slds-grid slds-gutters slds-p-around_medium">

                <div class="slds-col slds-size_1-of-3">
                    <div class="risk-tile risk-tile--high">
                        <p>HIGH RISK</p>
                        <p>{highRiskCount}</p>
                        <p>Requires Compliance Review</p>
                    </div>
                </div>

                <div class="slds-col slds-size_1-of-3">
                    <div class="risk-tile risk-tile--medium">
                        <p>MEDIUM RISK</p>
                        <p>{mediumRiskCount}</p>
                        <p>Standard Review</p>
                    </div>
                </div>

                <div class="slds-col slds-size_1-of-3">
                    <div class="risk-tile risk-tile--low">
                        <p>LOW RISK</p>
                        <p>{lowRiskCount}</p>
                        <p>Auto-Approved</p>
                    </div>
                </div>

            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_small">
                    High Risk Accounts — Pending Compliance Review
                </h2>

                <template if:true={hasHighRiskAccounts}>
                    <lightning-datatable
                        key-field="id"
                        data={highRiskAccounts}
                        columns={columns}
                        hide-checkbox-column
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}>
                    </lightning-datatable>
                </template>

                <template if:false={hasHighRiskAccounts}>
                    <div class="slds-align_absolute-center slds-p-around_medium">
                        <p>No high-risk accounts pending review.</p>
                    </div>
                </template>
            </div>

        </template>

    </lightning-card>
</template>
